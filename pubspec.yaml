name: webview_cef
description: Flutter Desktop Webview backed by CEF (Chromium Embedded Framework).

homepage: https://softyes.com.br
repository: https://github.com/hlwhl/webview_cef
issue_tracker: https://github.com/hlwhl/webview_cef/issues

version: 0.5.2

environment:
  flutter: ">=3.27.0"
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      linux:
        pluginClass: WebviewCefPlugin
      macos:
        pluginClass: WebviewCefPlugin
      windows:
        pluginClass: WebviewCefPluginCApi
